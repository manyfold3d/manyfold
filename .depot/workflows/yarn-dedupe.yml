# Depot CI Migration
# Source: .github/workflows/yarn-dedupe.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: Deduplicate NPM packages
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'
jobs:
  dedupe:
    if: github.triggering_actor != 'allcontributors[bot]'
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    steps:
      - uses: actions/checkout@v6
      - uses: ./.depot/actions/setup
      - name: Sync to translation.io
        run: yarn dedupe
      - name: Open pull request with changes
        uses: peter-evans/create-pull-request@v8
        with:
          token: "${{ secrets.TRANSLATION_SYNC_PAT }}"
          commit-message: "Deduplicated NPM packages"
          branch: "dependencies/dedupe"
          labels: dependencies
          title: "Deduplicate NPM packages"
          delete-branch: true
          add-paths: yarn.lock
